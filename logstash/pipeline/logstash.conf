input {
  http {
    port => 5000
    ecs_compatibility => disabled
  }
}

filter {
  # 1. Try to parse 'message' as JSON into 'app' (Handles raw string case)
  json {
    source => "message"
    target => "app"
    skip_on_invalid_json => true
  }

  # 2. If 'app' is still missing, it might have been auto-parsed to the root by the http input.
  # Move those fields to 'app' for structured storage.
  if ![app] and [level] {
    mutate {
      rename => { "level" => "[app][level]" }
      rename => { "method" => "[app][method]" }
      rename => { "url" => "[app][url]" }
      rename => { "ip" => "[app][ip]" }
      rename => { "timestamp" => "[app][timestamp]" }
      rename => { "message" => "[app][message]" }
      rename => { "search_engine" => "[app][search_engine]" }
      rename => { "status_code" => "[app][status_code]" }
      rename => { "response_time" => "[app][response_time]" }
    }
  }

  # 3. Ensure key fields are available at the root for easy querying.
  # We use copy to avoid array creation if fields were already promoted.
  if [app] {
    mutate {
      copy => { "[app][level]" => "level" }
      copy => { "[app][method]" => "method" }
      copy => { "[app][url]" => "url" }
      copy => { "[app][ip]" => "ip" }
      copy => { "[app][message]" => "message" }
      copy => { "[app][search_engine]" => "search_engine" }
      copy => { "[app][status_code]" => "status_code" }
      copy => { "[app][response_time]" => "response_time" }
    }
  }

  # 4. Handle timestamp
  if [app][timestamp] {
    date {
      match => ["[app][timestamp]", "ISO8601"]
      target => "@timestamp"
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "quickcart-logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
