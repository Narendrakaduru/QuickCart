services:
  mongodb:
    image: mongo:latest
    ports:
      - "27027:27017"
    volumes:
      - ./mongo_data:/data/db

  backend:
    build: ./backend
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=development
      - PORT=5001
      - MONGO_URI=mongodb://mongodb:27017/quickcart
      - REDIS_URI=redis://redis:6379
      - JWT_SECRET=quickcart_super_secret_key_123
      - JWT_EXPIRE=30d
    depends_on:
      - mongodb
      - redis

  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8005:8001"
    volumes:
      - ./redis_data:/data

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

