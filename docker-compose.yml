services:
  mongodb:
    image: mongo:latest
    ports:
      - "27027:27017"
    volumes:
      - ./mongo_data:/data/db

  backend:
    build: ./backend
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=development
      - PORT=5001
      - MONGO_URI=mongodb://mongodb:27017/quickcart
      - JWT_SECRET=quickcart_super_secret_key_123
      - JWT_EXPIRE=30d
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

